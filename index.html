<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdoboPop Inc</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .logo span { color: #e85d26; }
    .tagline {
      font-size: 1rem;
      color: #888;
      letter-spacing: 0.5px;
    }
    footer {
      position: absolute;
      bottom: 32px;
      font-size: 0.8rem;
      color: #444;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>

  <div class="logo">Adobo<span>Pop</span></div>
  <p class="tagline">Making cool things.</p>

  <footer>
    <a href="/miniforge/privacy-policy/">Privacy Policy</a>
  </footer>

</body>
</html>
